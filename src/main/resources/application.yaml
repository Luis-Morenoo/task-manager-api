spring:
  application:
    name: task-manager
  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  cache:
    type: none

server:
  port: 8080

logging:
  level:
    root: INFO
    com.luis.taskmanager: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
